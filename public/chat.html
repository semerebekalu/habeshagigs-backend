<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages - Ethio Gigs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Ethiopic:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { background: #f0f2f5; margin: 0; }

    /* Layout */
    .chat-app {
      display: grid;
      grid-template-columns: 340px 1fr;
      height: calc(100vh - 64px);
      background: #fff;
      box-shadow: 0 2px 20px rgba(0,0,0,.08);
    }

    /* Sidebar */
    .chat-sidebar {
      display: flex;
      flex-direction: column;
      background: #fff;
      border-right: 1px solid #e9edef;
      overflow: hidden;
    }
    .sidebar-top {
      padding: 14px 16px 10px;
      background: #f0f2f5;
      border-bottom: 1px solid #e9edef;
      flex-shrink: 0;
    }
    .sidebar-top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .sidebar-top-row h4 { font-weight: 700; font-size: 1.1rem; color: #111b21; margin: 0; }
    .new-chat-btn {
      background: #00a884;
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .new-chat-btn:hover { background: #008f72; }

    .search-box { position: relative; }
    .search-box svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: #8696a0;
    }
    .search-box input {
      width: 100%;
      padding: 8px 12px 8px 34px;
      border: none;
      border-radius: 8px;
      font-size: 0.88rem;
      outline: none;
      background: #fff;
      color: #111b21;
    }
    .search-box input::placeholder { color: #8696a0; }

    .conv-list { flex: 1; overflow-y: auto; }
    .conv-list::-webkit-scrollbar { width: 4px; }
    .conv-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

    .conv-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid #f0f2f5;
      transition: background .12s;
    }
    .conv-item:hover { background: #f5f6f6; }
    .conv-item.active { background: #f0f2f5; }
    .conv-avatar-wrap { position: relative; flex-shrink: 0; }
    .conv-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
    .conv-info { flex: 1; min-width: 0; }
    .conv-name-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 3px;
    }
    .conv-name {
      font-weight: 600;
      font-size: 0.93rem;
      color: #111b21;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
    }
    .conv-time { font-size: 0.7rem; color: #667781; flex-shrink: 0; }
    .conv-preview-row { display: flex; justify-content: space-between; align-items: center; }
    .conv-preview {
      color: #667781;
      font-size: 0.8rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .conv-unread {
      background: #25d366;
      color: #fff;
      border-radius: 50%;
      min-width: 20px;
      height: 20px;
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      flex-shrink: 0;
      padding: 0 4px;
      margin-left: 6px;
    }

    /* Chat window */
    .chat-window {
      display: flex;
      flex-direction: column;
      height: 100%;
      background: #efeae2;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4c9b8' fill-opacity='0.3'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    .chat-win-header {
      padding: 10px 16px;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #e9edef;
      flex-shrink: 0;
      min-height: 60px;
    }
    .chat-win-header img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
    }
    .chat-win-info { flex: 1; }
    .chat-win-name { font-weight: 700; font-size: 0.95rem; color: #111b21; }
    .chat-win-status { font-size: 0.75rem; color: #667781; margin-top: 1px; }
    .chat-win-actions { display: flex; gap: 4px; align-items: center; }
    .chat-win-actions a,
    .chat-win-actions button {
      background: none;
      border: none;
      color: #54656f;
      cursor: pointer;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      transition: background .15s;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }
    .chat-win-actions a:hover,
    .chat-win-actions button:hover { background: #e9edef; color: #111b21; }

    /* Messages area */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: clamp(8px, 2vw, 20px) clamp(12px, 3vw, 24px);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .chat-messages::-webkit-scrollbar { width: 5px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

    /* Message bubbles */
    .msg-wrap {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      margin-bottom: 1px;
      width: 100%;
    }
    .msg-wrap.sent { flex-direction: row-reverse; }
    .msg-wrap.recv { flex-direction: row; }

    .msg-bubble {
      max-width: clamp(200px, 60%, 520px);
      min-width: 60px;
      padding: 7px 10px 5px;
      border-radius: 8px;
      font-size: 0.93rem;
      line-height: 1.55;
      word-break: break-word;
      overflow-wrap: break-word;
      white-space: pre-wrap;
      position: relative;
      box-shadow: 0 1px 2px rgba(0,0,0,.1);
    }
    .msg-bubble.sent {
      background: #d9fdd3;
      color: #111b21;
      border-top-right-radius: 2px;
    }
    .msg-bubble.recv {
      background: #fff;
      color: #111b21;
      border-top-left-radius: 2px;
    }
    .msg-bubble.sent.tail::after {
      content: '';
      position: absolute;
      right: -8px;
      top: 0;
      border: 8px solid transparent;
      border-top-color: #d9fdd3;
      border-right: 0;
    }
    .msg-bubble.recv.tail::after {
      content: '';
      position: absolute;
      left: -8px;
      top: 0;
      border: 8px solid transparent;
      border-top-color: #fff;
      border-left: 0;
    }
    .msg-meta {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      margin-top: 3px;
    }
    .msg-time-sm { font-size: 0.68rem; color: #667781; }
    .msg-status { font-size: 0.72rem; color: #667781; font-weight: 600; }
    .msg-status.read { color: #53bdeb; }

    /* Date divider */
    .date-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 12px 0 8px;
    }
    .date-divider span {
      background: #fff;
      color: #54656f;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 8px;
      box-shadow: 0 1px 2px rgba(0,0,0,.1);
    }

    /* Typing indicator */
    .typing-wrap {
      padding: 4px clamp(12px, 3vw, 24px);
      min-height: 32px;
      flex-shrink: 0;
    }
    .typing-bubble {
      background: #fff;
      border-radius: 18px;
      padding: 8px 14px;
      display: none;
      align-items: center;
      gap: 4px;
      box-shadow: 0 1px 2px rgba(0,0,0,.1);
      width: fit-content;
    }
    .typing-bubble.show { display: flex; }
    .typing-dot {
      width: 7px;
      height: 7px;
      background: #90a4ae;
      border-radius: 50%;
      animation: typingBounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Input area */
    .chat-input-area {
      padding: 10px 16px;
      background: #f0f2f5;
      border-top: 1px solid #e9edef;
      flex-shrink: 0;
    }
    .chat-input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      background: #fff;
      border-radius: 24px;
      padding: 6px 6px 6px 14px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    .input-action-btn {
      background: none;
      border: none;
      color: #54656f;
      cursor: pointer;
      padding: 6px;
      border-radius: 50%;
      transition: background .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .input-action-btn:hover { background: #f0f2f5; color: #111b21; }
    .msg-textarea {
      flex: 1;
      border: none;
      outline: none;
      resize: none;
      font-size: 0.93rem;
      font-family: inherit;
      line-height: 1.5;
      max-height: 120px;
      background: transparent;
      color: #111b21;
      padding: 4px 0;
    }
    .msg-textarea::placeholder { color: #8696a0; }
    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #00a884;
      color: #fff;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .15s;
    }
    .send-btn:hover { background: #008f72; }
    .send-btn:disabled { background: #ccc; cursor: default; }

    /* Empty state */
    .chat-empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
      color: #54656f;
      gap: 16px;
      text-align: center;
      padding: 40px;
    }
    .chat-empty-icon {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, rgba(30,58,138,.12), rgba(20,184,166,.12));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .chat-empty-state h3 { font-size: 1.3rem; font-weight: 700; color: #111b21; margin: 0; }
    .chat-empty-state p { font-size: 0.9rem; margin: 0; max-width: 300px; line-height: 1.6; }

    /* File/image in message */
    .msg-img {
      max-width: 220px;
      border-radius: 6px;
      display: block;
      cursor: pointer;
      margin-bottom: 4px;
    }
    .msg-file-link {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: inherit;
      background: rgba(0,0,0,.05);
      border-radius: 6px;
      padding: 8px 10px;
    }
    .msg-file-link:hover { background: rgba(0,0,0,.1); }

    /* Modal */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 500;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-backdrop.open { display: flex; }
    .modal-card {
      background: #fff;
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 40px rgba(0,0,0,.2);
    }
    .modal-card h3 { font-weight: 700; margin: 0 0 6px; color: #111b21; }
    .modal-card p { color: #667781; font-size: 0.85rem; margin: 0 0 16px; }
    .modal-input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e9edef;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      margin-bottom: 8px;
      font-family: inherit;
      color: #111b21;
    }
    .modal-input:focus { border-color: #00a884; }
    .modal-preview { min-height: 22px; font-size: 0.85rem; margin-bottom: 14px; color: #54656f; }
    .modal-actions { display: flex; gap: 10px; }

    /* Mobile */
    @media (max-width: 768px) {
      .chat-app { grid-template-columns: 1fr; }
      .chat-sidebar {
        position: fixed;
        inset: 64px 0 0 0;
        z-index: 100;
        transform: translateX(-100%);
        transition: transform .25s;
        width: 100%;
      }
      .chat-sidebar.mobile-open { transform: translateX(0); }
      .chat-messages {
        padding: clamp(6px, 2vw, 12px);
      }
      .msg-bubble { max-width: clamp(200px, 80%, 400px); }
    }
    @media (min-width: 769px) {
      .mobile-back-btn { display: none !important; }
    }
  </style>
</head>

<div class="chat-app">
  <!-- Sidebar -->
  <div class="chat-sidebar" id="chatSidebar">
    <div class="sidebar-top">
      <div class="sidebar-top-row">
        <h4>Messages</h4>
        <button class="new-chat-btn" onclick="showNewChat()">New Chat</button>
      </div>
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="convSearch" placeholder="Search conversations" oninput="filterConvs(this.value)" />
      </div>
    </div>
    <div class="conv-list" id="convList">
      <div style="padding:30px;text-align:center;color:#667781;font-size:.88rem;">Loading...</div>
    </div>
  </div>

  <!-- Chat window -->
  <div class="chat-window" id="chatWindow">
    <div class="chat-empty-state">
      <div class="chat-empty-icon">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#1E3A8A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <h3>Ethio Gigs Messages</h3>
      <p>Send and receive messages with freelancers and clients. Select a conversation or start a new one.</p>
      <button class="btn btn-primary" onclick="showNewChat()">Start a Conversation</button>
    </div>
  </div>
</div>

<!-- New Chat Modal -->
<div id="newChatModal" class="modal-backdrop">
  <div class="modal-card">
    <h3>New Message</h3>
    <p>Search by @username, email, or user ID</p>
    <input type="text" id="newChatTarget" class="modal-input"
      placeholder="@username or email..."
      oninput="previewChatTarget(this.value)"
      onkeydown="if(event.key==='Enter')startNewChat()" />
    <div id="newChatPreview" class="modal-preview"></div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="startNewChat()">Start Chat</button>
      <button class="btn btn-outline" onclick="closeNewChat()">Cancel</button>

<script>
if (!isLoggedIn()) window.location.href = '/login.html';
const user = getUser();
let socket = null;
let activeConvId = null;
let allConvs = [];

// ---- Socket ----
function connectSocket() {
  socket = io({ auth: { token: getToken() }, reconnectionDelay: 1000 });
  socket.on('connect', function() { console.log('Socket connected'); });
  socket.on('connect_error', function(e) { console.warn('Socket error:', e.message); });

  socket.on('chat:receive', function(msg) {
    if (msg.conversation_id === activeConvId) {
      appendMessage(msg, false, true);
      socket.emit('chat:read', { conversation_id: activeConvId });
    } else {
      updateConvPreview(msg.conversation_id, msg.content);
      incrementUnreadBadge(msg.conversation_id);
      if (!allConvs.find(function(c) { return c.id === msg.conversation_id; })) {
        loadConversations(false);
      }
    }
  });

  socket.on('chat:typing', function(data) {
    if (data.conversation_id === activeConvId && data.sender_id !== user.id) {
      var bubble = document.getElementById('typingBubble');
      if (bubble) {
        bubble.classList.add('show');
        clearTimeout(bubble._timer);
        bubble._timer = setTimeout(function() { bubble.classList.remove('show'); }, 2500);
      }
    }
  });

  socket.on('chat:read', function(data) {
    if (data.conversation_id === activeConvId) {
      document.querySelectorAll('.msg-status').forEach(function(el) {
        el.textContent = 'vv';
        el.classList.add('read');
      });
    }
  });
}

// ---- Conversations ----
async function loadConversations(autoOpen) {
  if (autoOpen === undefined) autoOpen = true;
  try {
    var convs = await apiFetch('/chat/conversations/' + user.id);
    allConvs = convs;
    renderConvList(convs);
    if (autoOpen) {
      var params = new URLSearchParams(window.location.search);
      var withUser = params.get('with');
      if (withUser) openOrCreateConv(parseInt(withUser));
    }
  } catch(e) {
    document.getElementById('convList').innerHTML =
      '<div style="padding:20px;text-align:center;color:#667781;">Could not load conversations.</div>';
  }
}

function renderConvList(convs) {
  var list = document.getElementById('convList');
  if (!convs.length) {
    list.innerHTML = '<div style="padding:40px 20px;text-align:center;color:#667781;">' +
      '<div style="font-weight:600;margin-bottom:4px;color:#111b21;">No conversations yet</div>' +
      '<div style="font-size:.85rem;">Click "New Chat" to start one</div>' +
      '</div>';
    return;
  }
  list.innerHTML = convs.map(function(c) {
    var otherId   = c.participant_a === user.id ? c.participant_b      : c.participant_a;
    var otherName = c.participant_a === user.id ? c.participant_b_name : c.participant_a_name;
    var avatar    = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(otherName || 'U') + '&background=1E3A8A&color=fff&size=96';
    var timeAgo   = c.last_message_time ? getTimeAgo(c.last_message_time) : '';
    var preview   = c.last_message ? escapeHtml(c.last_message).substring(0, 50) : 'No messages yet';
    var activeClass = c.id === activeConvId ? ' active' : '';
    var safeName = (otherName || 'User').replace(/'/g, "\\'");
    return '<div class="conv-item' + activeClass + '" id="conv-' + c.id + '"' +
      ' onclick="openConversation(' + c.id + ',\'' + safeName + '\',' + otherId + ')">' +
      '<div class="conv-avatar-wrap">' +
      '<img class="conv-avatar" src="' + avatar + '" alt="' + escapeHtml(otherName || 'User') + '" />' +
      '</div>' +
      '<div class="conv-info">' +
      '<div class="conv-name-row">' +
      '<span class="conv-name">' + escapeHtml(otherName || 'User') + '</span>' +
      '<span class="conv-time">' + timeAgo + '</span>' +
      '</div>' +
      '<div class="conv-preview-row">' +
      '<span class="conv-preview">' + preview + '</span>' +
      '</div>' +
      '</div>' +
      '</div>';
  }).join('');
}

function filterConvs(q) {
  var filtered = allConvs.filter(function(c) {
    var name = c.participant_a === user.id ? c.participant_b_name : c.participant_a_name;
    return (name || '').toLowerCase().includes(q.toLowerCase());
  });
  renderConvList(filtered);
}

function updateConvPreview(convId, content) {
  var el = document.querySelector('#conv-' + convId + ' .conv-preview');
  if (el) el.textContent = (content || '').substring(0, 50);
  var timeEl = document.querySelector('#conv-' + convId + ' .conv-time');
  if (timeEl) timeEl.textContent = 'now';
  var convEl = document.getElementById('conv-' + convId);
  var listEl = document.getElementById('convList');
  if (convEl && listEl) listEl.prepend(convEl);
}

function incrementUnreadBadge(convId) {
  var badge = document.querySelector('#conv-' + convId + ' .conv-unread');
  if (badge) {
    badge.textContent = parseInt(badge.textContent || '0') + 1;
  } else {
    var convEl = document.getElementById('conv-' + convId);
    if (convEl) {
      badge = document.createElement('div');
      badge.className = 'conv-unread';
      badge.textContent = '1';
      var row = convEl.querySelector('.conv-preview-row');
      if (row) row.appendChild(badge);
    }
  }
}

// ---- Open conversation ----
async function openConversation(convId, name, otherId) {
  activeConvId = convId;
  document.querySelectorAll('.conv-item').forEach(function(el) { el.classList.remove('active'); });
  var convEl = document.getElementById('conv-' + convId);
  if (convEl) convEl.classList.add('active');
  var badgeEl = document.querySelector('#conv-' + convId + ' .conv-unread');
  if (badgeEl) badgeEl.remove();

  var avatar = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) + '&background=1E3A8A&color=fff&size=96';
  var safeName = escapeHtml(name);

  document.getElementById('chatWindow').innerHTML =
    '<div class="chat-win-header">' +
    '<img src="' + avatar + '" alt="' + safeName + '" onclick="window.open(\'/profile.html?id=' + otherId + '\',\'_blank\')" />' +
    '<div class="chat-win-info">' +
    '<div class="chat-win-name">' + safeName + '</div>' +
    '<div class="chat-win-status">Active</div>' +
    '</div>' +
    '<div class="chat-win-actions">' +
    '<a href="/profile.html?id=' + otherId + '" target="_blank">View Profile</a>' +
    '<button onclick="showNewChat()">New Chat</button>' +
    '</div>' +
    '</div>' +
    '<div class="chat-messages" id="messages"></div>' +
    '<div class="typing-wrap">' +
    '<div class="typing-bubble" id="typingBubble">' +
    '<div class="typing-dot"></div>' +
    '<div class="typing-dot"></div>' +
    '<div class="typing-dot"></div>' +
    '</div>' +
    '</div>' +
    '<div class="chat-input-area">' +
    '<div class="chat-input-row">' +
    '<label class="input-action-btn" title="Attach file (max 25MB)">' +
    '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
    '<path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>' +
    '</svg>' +
    '<input type="file" id="fileAttachInput" style="display:none;" onchange="sendFile()" accept="image/*,.pdf,.doc,.docx,.xlsx,.mp3,.wav,.ogg" />' +
    '</label>' +
    '<textarea class="msg-textarea" id="msgInput" placeholder="Type a message"' +
    ' rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>' +
    '<button class="send-btn" onclick="sendMessage()" title="Send">' +
    '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">' +
    '<path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>' +
    '</svg>' +
    '</button>' +
    '</div>' +
    '</div>';

  try {
    var messages = await apiFetch('/chat/messages/' + convId);
    var container = document.getElementById('messages');
    if (!messages.length) {
      container.innerHTML = '<div style="text-align:center;color:#667781;padding:40px;font-size:.88rem;">No messages yet. Say hello!</div>';
    } else {
      var lastDate = '';
      messages.forEach(function(m, i) {
        var msgDate = formatDate(m.created_at);
        if (msgDate !== lastDate) {
          container.insertAdjacentHTML('beforeend',
            '<div class="date-divider"><span>' + msgDate + '</span></div>');
          lastDate = msgDate;
        }
        var isMine = m.sender_id === user.id;
        var isFirst = i === 0 || messages[i-1].sender_id !== m.sender_id;
        appendMessage(m, isMine, isFirst);
      });
      container.scrollTop = container.scrollHeight;
    }
  } catch(e) { console.error('Load messages error:', e); }

  var msgInput = document.getElementById('msgInput');
  if (msgInput) msgInput.focus();
  markConvRead(convId);
  var sidebar = document.getElementById('chatSidebar');
  if (sidebar) sidebar.classList.remove('mobile-open');
}

async function openOrCreateConv(otherId) {
  try {
    var res = await apiFetch('/chat/conversations/start', {
      method: 'POST',
      body: JSON.stringify({ other_user_id: otherId })
    });
    var convs = await apiFetch('/chat/conversations/' + user.id);
    allConvs = convs;
    renderConvList(convs);
    var found = convs.find(function(c) { return c.id === res.conversation_id; });
    if (found) {
      var otherName = found.participant_a === user.id ? found.participant_b_name : found.participant_a_name;
      openConversation(res.conversation_id, otherName || 'User', otherId);
    }
  } catch(err) {
    if (typeof toast === 'function') toast(err.message || 'Could not start conversation', 'error');
  }
}

// ---- Append message ----
function appendMessage(msg, isMine, isFirst) {
  var container = document.getElementById('messages');
  if (!container) return;
  if (msg.id && String(msg.id).indexOf('temp_') !== 0 &&
      container.querySelector('[data-msg-id="' + msg.id + '"]')) return;

  var time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  var ct = msg.content_type || 'text';
  var contentHtml = '';

  if (ct === 'image' && msg.file_url) {
    contentHtml = '<img src="' + msg.file_url + '" onclick="window.open(\'' + msg.file_url + '\',\'_blank\')"' +
      ' style="max-width:100%;width:220px;border-radius:6px;display:block;cursor:pointer;margin-bottom:2px;" alt="image" />';
  } else if (ct === 'document' && msg.file_url) {
    var fname = decodeURIComponent(msg.file_url.split('/').pop().replace(/^\d+-/, ''));
    contentHtml = '<a href="' + msg.file_url + '" target="_blank" class="msg-file-link">' +
      '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
      '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>' +
      '</svg>' +
      '<span style="text-decoration:underline;">' + escapeHtml(fname) + '</span>' +
      '</a>';
  } else if (ct === 'voice' && msg.file_url) {
    contentHtml = '<audio controls src="' + msg.file_url + '" style="max-width:200px;"></audio>';
  } else {
    contentHtml = escapeHtml(msg.content || '');
  }

  var statusHtml = '';
  if (isMine) {
    var isRead = msg.is_read;
    var statusClass = isRead ? ' read' : '';
    var statusText = isRead ? 'vv' : 'v';
    statusHtml = '<span class="msg-status' + statusClass + '">' + statusText + '</span>';
  }

  var el = document.createElement('div');
  el.className = 'msg-wrap' + (isMine ? ' sent' : ' recv');
  el.setAttribute('data-msg-id', msg.id || '');
  el.innerHTML =
    '<div>' +
    '<div class="msg-bubble ' + (isMine ? 'sent' : 'recv') + (isFirst ? ' tail' : '') + '">' +
    contentHtml +
    '<div class="msg-meta">' +
    '<span class="msg-time-sm">' + time + '</span>' +
    statusHtml +
    '</div>' +
    '</div>' +
    '</div>';
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

function escapeHtml(t) {
  return (t || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function formatDate(dateStr) {
  var d = new Date(dateStr);
  var today = new Date();
  var yesterday = new Date(today);
  yesterday.setDate(today.getDate() - 1);
  if (d.toDateString() === today.toDateString()) return 'Today';
  if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
  return d.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
}

function getTimeAgo(dateStr) {
  if (!dateStr) return '';
  var diff = Date.now() - new Date(dateStr).getTime();
  var m = Math.floor(diff / 60000);
  if (m < 1) return 'now';
  if (m < 60) return m + 'm';
  var h = Math.floor(m / 60);
  if (h < 24) return h + 'h';
  var d = Math.floor(h / 24);
  if (d < 7) return d + 'd';
  return new Date(dateStr).toLocaleDateString([], { month: 'short', day: 'numeric' });
}

// ---- Send ----
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  } else if (socket && activeConvId) {
    var otherId = getOtherUserId();
    if (otherId) socket.emit('chat:typing', { recipient_id: otherId, conversation_id: activeConvId });
  }
}

function getOtherUserId() {
  var conv = allConvs.find(function(c) { return c.id === activeConvId; });
  if (!conv) return null;
  return conv.participant_a === user.id ? conv.participant_b : conv.participant_a;
}

async function sendMessage() {
  var input = document.getElementById('msgInput');
  if (!input) return;
  var content = input.value.trim();
  if (!content || !activeConvId) return;
  input.value = '';
  autoResize(input);

  var tempId = 'temp_' + Date.now();
  appendMessage({
    id: tempId,
    conversation_id: activeConvId,
    sender_id: user.id,
    sender_name: user.name,
    content: content,
    content_type: 'text',
    created_at: new Date().toISOString(),
    is_read: 0
  }, true, true);

  updateConvPreview(activeConvId, content);

  if (socket && socket.connected) {
    socket.emit('chat:send', { conversation_id: activeConvId, content: content, content_type: 'text' });
  } else {
    try {
      await apiFetch('/chat/messages', {
        method: 'POST',
        body: JSON.stringify({ conversation_id: activeConvId, content: content })
      });
    } catch(e) { console.error('Send error:', e); }
  }
}

async function sendFile() {
  var input = document.getElementById('fileAttachInput');
  if (!input || !input.files || !input.files[0] || !activeConvId) return;
  var file = input.files[0];
  var formData = new FormData();
  formData.append('file', file);
  formData.append('conversation_id', activeConvId);

  var tempId = 'temp_' + Date.now();
  var isImage = file.type.startsWith('image/');
  appendMessage({
    id: tempId,
    conversation_id: activeConvId,
    sender_id: user.id,
    content: isImage ? '[Image]' : '[File: ' + file.name + ']',
    content_type: isImage ? 'image' : 'document',
    created_at: new Date().toISOString(),
    is_read: 0
  }, true, true);

  try {
    var token = getToken();
    var res = await fetch('/api/chat/upload', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token },
      body: formData
    });
    var data = await res.json();
    if (socket && socket.connected) {
      socket.emit('chat:send', {
        conversation_id: activeConvId,
        content: data.url || '',
        content_type: isImage ? 'image' : 'document',
        file_url: data.url
      });
    }
  } catch(e) { console.error('File upload error:', e); }
  input.value = '';
}

function markConvRead(convId) {
  if (socket && socket.connected) {
    socket.emit('chat:read', { conversation_id: convId });
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

var _previewTimer = null;
function showNewChat() {
  var modal = document.getElementById('newChatModal');
  if (modal) {
    modal.classList.add('open');
    var inp = document.getElementById('newChatTarget');
    if (inp) { inp.value = ''; inp.focus(); }
    var prev = document.getElementById('newChatPreview');
    if (prev) prev.textContent = '';
  }
}

function closeNewChat() {
  var modal = document.getElementById('newChatModal');
  if (modal) modal.classList.remove('open');
}

async function startNewChat() {
  var inp = document.getElementById('newChatTarget');
  var val = inp ? inp.value.trim() : '';
  if (!val) return;
  try {
    var found = null;
    if (val.startsWith('@') || (!val.includes('@') && isNaN(parseInt(val)))) {
      found = await apiFetch('/users/search?username=' + encodeURIComponent(val.replace('@',''))).catch(function(){return null;});
    } else if (val.includes('@') && val.includes('.')) {
      found = await apiFetch('/users/search?email=' + encodeURIComponent(val)).catch(function(){return null;});
    } else if (!isNaN(parseInt(val))) {
      found = { id: parseInt(val) };
    }
    if (!found || !found.id) {
      var prev = document.getElementById('newChatPreview');
      if (prev) prev.textContent = 'User not found.';
      return;
    }
    if (found.id === user.id) {
      var prev = document.getElementById('newChatPreview');
      if (prev) prev.textContent = "You can't message yourself.";
      return;
    }
    closeNewChat();
    openOrCreateConv(found.id);
  } catch(e) {
    var prev = document.getElementById('newChatPreview');
    if (prev) prev.textContent = 'User not found.';
  }
}

function previewChatTarget(val) {
  clearTimeout(_previewTimer);
  var prev = document.getElementById('newChatPreview');
  if (!val || val.trim().length < 2) { if (prev) prev.textContent = ''; return; }
  _previewTimer = setTimeout(async function() {
    try {
      var q = val.trim();
      var found = null;
      if (q.startsWith('@') || (!q.includes('@') && isNaN(parseInt(q)))) {
        found = await apiFetch('/users/search?username=' + encodeURIComponent(q.replace('@',''))).catch(function(){return null;});
      } else if (q.includes('@') && q.includes('.')) {
        found = await apiFetch('/users/search?email=' + encodeURIComponent(q)).catch(function(){return null;});
      }
      if (found && found.id && found.full_name) {
        if (prev) prev.innerHTML = 'Found: <strong>' + escapeHtml(found.full_name) + '</strong>' + (found.username ? ' (@' + found.username + ')' : '');
      } else {
        if (prev) prev.textContent = '';
      }
    } catch(e) { if (prev) prev.textContent = ''; }
  }, 400);
}

// ---- Init ----
connectSocket();
loadConversations(true);

// Close modal on backdrop click
document.getElementById('newChatModal').addEventListener('click', function(e) {
  if (e.target === this) closeNewChat();
});
</script>
