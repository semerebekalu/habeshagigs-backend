<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages â€” Ethio Gigs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Ethiopic:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { background: #f0f2f5; margin: 0; }

    /* â”€â”€ Layout â”€â”€ */
    .chat-app {
      display: grid;
      grid-template-columns: 340px 1fr;
      height: calc(100vh - 64px);
      background: #fff;
      box-shadow: 0 2px 20px rgba(0,0,0,.08);
    }

    /* â”€â”€ Sidebar â”€â”€ */
    .chat-sidebar {
      display: flex;
      flex-direction: column;
      background: #fff;
      border-right: 1px solid #e9edef;
    }
    .sidebar-top {
      padding: 14px 16px 10px;
      background: #f0f2f5;
      border-bottom: 1px solid #e9edef;
    }
    .sidebar-top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .sidebar-top-row h4 { font-weight: 700; font-size: 1.1rem; color: #111b21; margin: 0; }
    .sidebar-top-row .new-chat-btn {
      background: #00a884;
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background .15s;
    }
    .sidebar-top-row .new-chat-btn:hover { background: #008f72; }
    .search-box {
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: 8px 12px 8px 36px;
      border: none;
      border-radius: 8px;
      font-size: 0.88rem;
      outline: none;
      background: #fff;
      color: #111b21;
    }
    .search-box::before {
      content: 'ðŸ”';
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.85rem;
      pointer-events: none;
    }
    .conv-list { flex: 1; overflow-y: auto; }
    .conv-list::-webkit-scrollbar { width: 4px; }
    .conv-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

    .conv-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid #f0f2f5;
      transition: background .12s;
      position: relative;
    }
    .conv-item:hover { background: #f5f6f6; }
    .conv-item.active { background: #f0f2f5; }
    .conv-avatar-wrap { position: relative; flex-shrink: 0; }
    .conv-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      background: #dfe5e7;
    }
    .conv-online-dot {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 11px;
      height: 11px;
      background: #25d366;
      border-radius: 50%;
      border: 2px solid #fff;
    }
    .conv-info { flex: 1; min-width: 0; }
    .conv-name-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 3px;
    }
    .conv-name { font-weight: 600; font-size: 0.93rem; color: #111b21; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
    .conv-time { font-size: 0.7rem; color: #667781; flex-shrink: 0; }
    .conv-preview-row { display: flex; justify-content: space-between; align-items: center; }
    .conv-preview { color: #667781; font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .conv-unread {
      background: #25d366;
      color: #fff;
      border-radius: 50%;
      min-width: 20px;
      height: 20px;
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      flex-shrink: 0;
      padding: 0 4px;
    }
    .conv-empty {
      padding: 40px 20px;
      text-align: center;
      color: #667781;
      font-size: 0.88rem;
      line-height: 1.6;
    }

    /* â”€â”€ Chat window â”€â”€ */
    .chat-window {
      display: flex;
      flex-direction: column;
      height: 100%;
      background: #efeae2;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4c9b8' fill-opacity='0.3'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .chat-win-header {
      padding: 10px 16px;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #e9edef;
      flex-shrink: 0;
      min-height: 60px;
    }
    .chat-win-header img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
    }
    .chat-win-info { flex: 1; }
    .chat-win-name { font-weight: 700; font-size: 0.95rem; color: #111b21; }
    .chat-win-status { font-size: 0.75rem; color: #667781; margin-top: 1px; }
    .chat-win-actions { display: flex; gap: 4px; }
    .chat-win-actions a, .chat-win-actions button {
      background: none;
      border: none;
      color: #54656f;
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      font-size: 1rem;
      transition: background .15s;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;

    .chat-win-actions a:hover, .chat-win-actions button:hover { background: #e9edef; }

    /* Messages area */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 5%;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .chat-messages::-webkit-scrollbar { width: 5px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

    .msg-group { margin-bottom: 4px; }
    .msg-wrap {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      margin-bottom: 2px;
    }
    .msg-wrap.sent { flex-direction: row-reverse; }
    .msg-avatar-sm {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      flex-shrink: 0;
      align-self: flex-end;
    }
    .msg-bubble {
      max-width: 72%;
      min-width: 80px;
      padding: 7px 10px 5px;
      border-radius: 8px;
      font-size: 0.92rem;
      line-height: 1.5;
      word-break: break-word;
      word-wrap: break-word;
      overflow-wrap: break-word;
      white-space: pre-wrap;
      position: relative;
      box-shadow: 0 1px 2px rgba(0,0,0,.1);
    }
    .msg-bubble.sent {
      background: #d9fdd3;
      color: #111b21;
      border-top-right-radius: 2px;
    }
    .msg-bubble.recv {
      background: #fff;
      color: #111b21;
      border-top-left-radius: 2px;
    }
    .msg-meta {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      margin-top: 3px;
    }
    .msg-time-sm { font-size: 0.68rem; color: #667781; }
    .msg-status { font-size: 0.75rem; color: #667781; }
    .msg-status.read { color: #53bdeb; }

    /* Tail for first message in group */
    .msg-bubble.sent.tail::after {
      content: '';
      position: absolute;
      right: -8px;
      top: 0;
      border: 8px solid transparent;
      border-top-color: #d9fdd3;
      border-right: 0;
    }
    .msg-bubble.recv.tail::after {
      content: '';
      position: absolute;
      left: -8px;
      top: 0;
      border: 8px solid transparent;
      border-top-color: #fff;
      border-left: 0;
    }

    /* Date divider */
    .date-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 12px 0 8px;
    }
    .date-divider span {
      background: #fff;
      color: #54656f;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 8px;
      box-shadow: 0 1px 2px rgba(0,0,0,.1);
    }

    /* Typing indicator */
    .typing-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8%;
      min-height: 28px;
      flex-shrink: 0;
    }
    .typing-bubble {
      background: #fff;
      border-radius: 18px;
      padding: 8px 14px;
      display: none;
      align-items: center;
      gap: 4px;
      box-shadow: 0 1px 2px rgba(0,0,0,.1);
    }
    .typing-bubble.show { display: flex; }
    .typing-dot {
      width: 7px;
      height: 7px;
      background: #90a4ae;
      border-radius: 50%;
      animation: typingBounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes typingBounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    /* Input area */
    .chat-input-area {
      padding: 10px 16px;
      background: #f0f2f5;
      border-top: 1px solid #e9edef;
      flex-shrink: 0;
    }
    .chat-input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      background: #fff;
      border-radius: 24px;
      padding: 6px 6px 6px 14px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    .input-actions { display: flex; gap: 2px; align-items: center; }
    .input-action-btn {
      background: none;
      border: none;
      color: #54656f;
      cursor: pointer;
      padding: 6px;
      border-radius: 50%;
      font-size: 1.1rem;
      transition: background .15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .input-action-btn:hover { background: #f0f2f5; }
    .msg-textarea {
      flex: 1;
      border: none;
      outline: none;
      resize: none;
      font-size: 0.93rem;
      font-family: inherit;
      line-height: 1.5;
      max-height: 120px;
      background: transparent;
      color: #111b21;
      padding: 4px 0;
    }
    .msg-textarea::placeholder { color: #8696a0; }
    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #00a884;
      color: #fff;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
      transition: background .15s;
    }
    .send-btn:hover { background: #008f72; }
    .send-btn:disabled { background: #ccc; cursor: default; }

    /* Empty state */
    .chat-empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
      color: #54656f;
      gap: 16px;
      text-align: center;
      padding: 40px;
    }
    .chat-empty-state .empty-icon {
      width: 200px;
      height: 200px;
      background: linear-gradient(135deg, #1E3A8A22, #14B8A622);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
    }
    .chat-empty-state h3 { font-size: 1.3rem; font-weight: 700; color: #111b21; margin: 0; }
    .chat-empty-state p { font-size: 0.9rem; margin: 0; max-width: 300px; line-height: 1.6; }

    /* Image preview in message */
    .msg-img { max-width: 220px; border-radius: 6px; display: block; cursor: pointer; margin-bottom: 4px; }
    .msg-file-link {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: inherit;
      background: rgba(0,0,0,.05);
      border-radius: 6px;
      padding: 8px 10px;
    }
    .msg-file-link:hover { background: rgba(0,0,0,.1); }

    /* Mobile */
    @media (max-width: 768px) {
      .chat-app { grid-template-columns: 1fr; }
      .chat-sidebar { position: fixed; inset: 64px 0 0 0; z-index: 100; transform: translateX(-100%); transition: transform .25s; width: 100%; }
      .chat-sidebar.mobile-open { transform: translateX(0); }
      .chat-messages { padding: 12px 3%; }
      .msg-bubble { max-width: 85%; }
    }
    @media (min-width: 769px) {
      .mobile-back-btn { display: none !important; }
    }
  </style>

<script>
if (!isLoggedIn()) window.location.href = '/login.html';
const user = getUser();
let socket = null;
let activeConvId = null;
let allConvs = [];

// ── Socket ──────────────────────────────────────────────────
function connectSocket() {
  socket = io({ auth: { token: getToken() }, reconnectionDelay: 1000 });
  socket.on('connect', () => console.log('✅ Socket connected'));
  socket.on('connect_error', (e) => console.warn('Socket error:', e.message));

  socket.on('chat:receive', (msg) => {
    // Server only sends this to the RECIPIENT — not back to sender
    if (msg.conversation_id === activeConvId) {
      appendMessage(msg, false, true);
      socket.emit('chat:read', { conversation_id: activeConvId });
    } else {
      updateConvPreview(msg.conversation_id, msg.content);
      incrementUnreadBadge(msg.conversation_id);
      if (!allConvs.find(c => c.id === msg.conversation_id)) {
        loadConversations(false);
      }
    }
  });

  socket.on('chat:typing', (data) => {
    if (data.conversation_id === activeConvId && data.sender_id !== user.id) {
      const bubble = document.getElementById('typingBubble');
      if (bubble) {
        bubble.classList.add('show');
        clearTimeout(bubble._timer);
        bubble._timer = setTimeout(() => bubble.classList.remove('show'), 2500);
      }
    }
  });

  socket.on('chat:read', (data) => {
    if (data.conversation_id === activeConvId) {
      document.querySelectorAll('.msg-status').forEach(el => {
        el.textContent = '✓✓';
        el.style.color = '#53bdeb';
      });
    }
  });
}

// ── Conversations ───────────────────────────────────────────
async function loadConversations(autoOpen = true) {
  try {
    const convs = await apiFetch(`/chat/conversations/${user.id}`);
    allConvs = convs;
    renderConvList(convs);
    if (autoOpen) {
      const params = new URLSearchParams(window.location.search);
      const withUser = params.get('with');
      if (withUser) openOrCreateConv(parseInt(withUser));
    }
  } catch {
    document.getElementById('convList').innerHTML =
      '<div style="padding:20px;text-align:center;color:#667781;">Could not load conversations.</div>';
  }
}

function renderConvList(convs) {
  const list = document.getElementById('convList');
  if (!convs.length) {
    list.innerHTML = `<div style="padding:40px 20px;text-align:center;color:#667781;">
      <div style="font-size:2.5rem;margin-bottom:10px;">💬</div>
      <div style="font-weight:600;margin-bottom:4px;color:#111b21;">No conversations yet</div>
      <div style="font-size:.85rem;">Click "New Chat" to start one</div>
    </div>`;
    return;
  }
  list.innerHTML = convs.map(c => {
    const otherId   = c.participant_a === user.id ? c.participant_b      : c.participant_a;
    const otherName = c.participant_a === user.id ? c.participant_b_name : c.participant_a_name;
    const avatar    = `https://ui-avatars.com/api/?name=${encodeURIComponent(otherName||'U')}&background=1E3A8A&color=fff&size=96`;
    const timeAgo   = c.last_message_time ? getTimeAgo(c.last_message_time) : '';
    const preview   = c.last_message ? escapeHtml(c.last_message).substring(0, 50) : 'No messages yet';
    return `
      <div class="conv-item${c.id === activeConvId ? ' active' : ''}" id="conv-${c.id}"
           onclick="openConversation(${c.id},'${(otherName||'User').replace(/'/g,"\\'")}',${otherId})">
        <div class="conv-avatar-wrap">
          <img class="conv-avatar" src="${avatar}" alt="${otherName}" />
        </div>
        <div class="conv-info">
          <div class="conv-name-row">
            <span class="conv-name">${otherName || 'User'}</span>
            <span class="conv-time">${timeAgo}</span>
          </div>
          <div class="conv-preview-row">
            <span class="conv-preview">${preview}</span>
          </div>
        </div>
      </div>`;
  }).join('');
}

function filterConvs(q) {
  const filtered = allConvs.filter(c => {
    const name = c.participant_a === user.id ? c.participant_b_name : c.participant_a_name;
    return (name || '').toLowerCase().includes(q.toLowerCase());
  });
  renderConvList(filtered);
}

function updateConvPreview(convId, content) {
  const el = document.querySelector(`#conv-${convId} .conv-preview`);
  if (el) el.textContent = (content || '').substring(0, 50);
  const timeEl = document.querySelector(`#conv-${convId} .conv-time`);
  if (timeEl) timeEl.textContent = 'now';
  const convEl = document.getElementById(`conv-${convId}`);
  const list = document.getElementById('convList');
  if (convEl && list) list.prepend(convEl);
}

function incrementUnreadBadge(convId) {
  let badge = document.querySelector(`#conv-${convId} .conv-unread`);
  if (badge) {
    badge.textContent = parseInt(badge.textContent || '0') + 1;
  } else {
    const convEl = document.getElementById(`conv-${convId}`);
    if (convEl) {
      badge = document.createElement('div');
      badge.className = 'conv-unread';
      badge.textContent = '1';
      const row = convEl.querySelector('.conv-preview-row');
      if (row) row.appendChild(badge);
    }
  }
}

// ── Open conversation ───────────────────────────────────────
async function openConversation(convId, name, otherId) {
  activeConvId = convId;
  document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`conv-${convId}`)?.classList.add('active');
  document.querySelector(`#conv-${convId} .conv-unread`)?.remove();

  const avatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=1E3A8A&color=fff&size=96`;

  document.getElementById('chatWindow').innerHTML = `
    <div class="chat-win-header">
      <img src="${avatar}" alt="${name}" onclick="window.open('/profile.html?id=${otherId}','_blank')" style="cursor:pointer;" />
      <div class="chat-win-info">
        <div class="chat-win-name">${escapeHtml(name)}</div>
        <div class="chat-win-status">Active</div>
      </div>
      <div class="chat-win-actions">
        <a href="/profile.html?id=${otherId}" target="_blank" title="View profile">👤</a>
        <button onclick="showNewChat()" title="New chat">✏️</button>
      </div>
    </div>
    <div class="chat-messages" id="messages"></div>
    <div class="typing-wrap">
      <div class="typing-bubble" id="typingBubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
    <div class="chat-input-area">
      <div class="chat-input-row">
        <div class="input-actions">
          <label class="input-action-btn" title="Attach file (max 25MB)">
            📎<input type="file" id="fileAttachInput" style="display:none;"
              onchange="sendFile()" accept="image/*,.pdf,.doc,.docx,.xlsx,.mp3,.wav,.ogg" />
          </label>
        </div>
        <textarea class="msg-textarea" id="msgInput" placeholder="Type a message"
          rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" onclick="sendMessage()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>`;

  try {
    const messages = await apiFetch(`/chat/messages/${convId}`);
    const container = document.getElementById('messages');
    if (!messages.length) {
      container.innerHTML = `<div style="text-align:center;color:#667781;padding:40px;font-size:.88rem;">
        <div style="font-size:2rem;margin-bottom:8px;">👋</div>No messages yet. Say hello!
      </div>`;
    } else {
      let lastDate = '';
      messages.forEach((m, i) => {
        const msgDate = formatDate(m.created_at);
        if (msgDate !== lastDate) {
          container.insertAdjacentHTML('beforeend',
            `<div class="date-divider"><span>${msgDate}</span></div>`);
          lastDate = msgDate;
        }
        const isMine = m.sender_id === user.id;
        const isFirst = i === 0 || messages[i-1].sender_id !== m.sender_id;
        appendMessage(m, isMine, isFirst);
      });
      container.scrollTop = container.scrollHeight;
    }
  } catch (e) { console.error('Load messages error:', e); }

  document.getElementById('msgInput')?.focus();
  markConvRead(convId);
  // Mobile: hide sidebar
  document.getElementById('chatSidebar')?.classList.remove('mobile-open');
}

async function openOrCreateConv(otherId) {
  try {
    const res = await apiFetch('/chat/conversations/start', {
      method: 'POST',
      body: JSON.stringify({ other_user_id: otherId })
    });
    const convs = await apiFetch(`/chat/conversations/${user.id}`);
    allConvs = convs;
    renderConvList(convs);
    const found = convs.find(c => c.id === res.conversation_id);
    if (found) {
      const otherName = found.participant_a === user.id ? found.participant_b_name : found.participant_a_name;
      openConversation(res.conversation_id, otherName || 'User', otherId);
    }
  } catch (err) {
    toast(err.message || 'Could not start conversation', 'error');
  }
}

// ── Append message ──────────────────────────────────────────
function appendMessage(msg, isMine, isFirst) {
  const container = document.getElementById('messages');
  if (!container) return;
  if (msg.id && !String(msg.id).startsWith('temp_') &&
      container.querySelector(`[data-msg-id="${msg.id}"]`)) return;

  const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const ct = msg.content_type || 'text';
  let contentHtml = '';

  if (ct === 'image' && msg.file_url) {
    const imgUrl = msg.file_url.startsWith('http') ? msg.file_url : msg.file_url;
    contentHtml = `<img src="${imgUrl}" onclick="window.open('${imgUrl}','_blank')"
      style="max-width:100%;width:220px;border-radius:6px;display:block;cursor:pointer;margin-bottom:2px;" alt="image"
      onerror="this.style.display='none';this.nextSibling.style.display='flex'" />
      <a href="${imgUrl}" target="_blank" style="display:none;align-items:center;gap:6px;color:inherit;text-decoration:none;background:rgba(0,0,0,.06);border-radius:6px;padding:8px 10px;">
        <span style="font-size:1.4rem;">🖼️</span><span style="text-decoration:underline;">View image</span>
      </a>`;
  } else if (ct === 'document' && msg.file_url) {
    const fname = decodeURIComponent(msg.file_url.split('/').pop().replace(/^\d+-/, ''));
    contentHtml = `<a href="${msg.file_url}" target="_blank"
      style="display:flex;align-items:center;gap:8px;color:inherit;text-decoration:none;background:rgba(0,0,0,.06);border-radius:6px;padding:8px 10px;">
      <span style="font-size:1.4rem;">📄</span><span style="text-decoration:underline;">${escapeHtml(fname)}</span>
    </a>`;
  } else if (ct === 'voice' && msg.file_url) {
    contentHtml = `<audio controls src="${msg.file_url}" style="max-width:200px;"></audio>`;
  } else {
    contentHtml = escapeHtml(msg.content || '');
  }

  const statusHtml = isMine
    ? `<span class="msg-status" style="font-size:.7rem;color:${msg.is_read ? '#53bdeb' : '#667781'};">${msg.is_read ? '✓✓' : '✓'}</span>`
    : '';

  const el = document.createElement('div');
  el.className = `msg-wrap${isMine ? ' sent' : ''}`;
  el.setAttribute('data-msg-id', msg.id || '');
  el.innerHTML = `
    <div>
      <div class="msg-bubble ${isMine ? 'sent' : 'recv'}${isFirst ? ' tail' : ''}">
        ${contentHtml}
        <div style="display:flex;align-items:center;justify-content:flex-end;gap:4px;margin-top:3px;">
          <span style="font-size:.68rem;color:#667781;">${time}</span>
          ${statusHtml}
        </div>
      </div>
    </div>`;
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

function escapeHtml(t) {
  return (t || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  const today = new Date();
  const yesterday = new Date(today);
  yesterday.setDate(today.getDate() - 1);
  if (d.toDateString() === today.toDateString()) return 'Today';
  if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
  return d.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
}

function getTimeAgo(dateStr) {
  if (!dateStr) return '';
  const diff = Date.now() - new Date(dateStr).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'now';
  if (m < 60) return `${m}m`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h`;
  const d = Math.floor(h / 24);
  if (d < 7) return `${d}d`;
  return new Date(dateStr).toLocaleDateString([], { month: 'short', day: 'numeric' });
}

// ── Send ────────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  } else if (socket && activeConvId) {
    const otherId = getOtherUserId();
    if (otherId) socket.emit('chat:typing', { recipient_id: otherId, conversation_id: activeConvId });
  }
}

function getOtherUserId() {
  const conv = allConvs.find(c => c.id === activeConvId);
  if (!conv) return null;
  return conv.participant_a === user.id ? conv.participant_b : conv.participant_a;
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const content = input?.value?.trim();
  if (!content || !activeConvId) return;
  input.value = '';
  autoResize(input);

  const tempId = 'temp_' + Date.now();
  appendMessage({
    id: tempId, conversation_id: activeConvId,
    sender_id: user.id, sender_name: user.name,
    content, content_type: 'text',
    created_at: new Date().toISOString(), is_read: 0
  }, true, true);

  updateConvPreview(activeConvId, content);

  if (socket && socket.connected) {
    socket.emit('chat:send', { conversation_id: activeConvId, content, content_type: 'text' });
  } else {
    try {
      await apiFetch('/chat/messages', {
        method: 'POST', body: JSON.stringify({ conversation_id: activeConvId, content })
      });
    } catch {
      toast('Failed to send message', 'error');
      document.querySelector(`[data-msg-id="${tempId}"]`)?.remove();
    }
  }
}

async function sendFile() {
  const input = document.getElementById('fileAttachInput');
  if (!input || !input.files[0] || !activeConvId) return;
  const file = input.files[0];
  if (file.size > 25 * 1024 * 1024) { toast('File must be under 25 MB', 'error'); input.value = ''; return; }

  const fd = new FormData();
  fd.append('file', file);
  try {
    toast('Uploading...', '');
    const res = await fetch(`${location.origin}/api/chat/upload`, {
      method: 'POST', headers: { Authorization: `Bearer ${getToken()}` }, body: fd
    });
    const data = await res.json();
    if (!res.ok) throw data;

    const tempId = 'temp_' + Date.now();
    appendMessage({
      id: tempId, conversation_id: activeConvId,
      sender_id: user.id, sender_name: user.name,
      content: file.name, content_type: data.content_type,
      file_url: data.file_url, created_at: new Date().toISOString(), is_read: 0
    }, true, true);

    if (socket && socket.connected) {
      socket.emit('chat:send', {
        conversation_id: activeConvId, content: file.name,
        content_type: data.content_type, file_url: data.file_url
      });
    }
    updateConvPreview(activeConvId, `📎 ${file.name}`);
    input.value = '';
  } catch (err) {
    toast(err.message || 'Upload failed', 'error');
  }
}

async function markConvRead(convId) {
  if (socket && socket.connected) {
    socket.emit('chat:read', { conversation_id: convId });
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── New chat modal ──────────────────────────────────────────
function showNewChat() {
  const m = document.getElementById('newChatModal');
  m.style.display = 'flex';
  setTimeout(() => document.getElementById('newChatTarget')?.focus(), 50);
}

function closeNewChat() {
  document.getElementById('newChatModal').style.display = 'none';
  document.getElementById('newChatTarget').value = '';
  document.getElementById('newChatPreview').textContent = '';
}

async function startNewChat() {
  const target = document.getElementById('newChatTarget').value.trim();
  if (!target) { toast('Enter a username or email', 'error'); return; }
  try {
    let userId = null;
    if (target.startsWith('@') || (!target.includes('@') && isNaN(parseInt(target)))) {
      const found = await apiFetch(`/users/search?username=${encodeURIComponent(target.replace('@',''))}`);
      if (!found || !found.id) { toast('User not found', 'error'); return; }
      userId = found.id;
    } else if (target.includes('@') && target.includes('.')) {
      const found = await apiFetch(`/users/search?email=${encodeURIComponent(target)}`);
      if (!found || !found.id) { toast('No user found with that email', 'error'); return; }
      userId = found.id;
    } else if (!isNaN(parseInt(target))) {
      userId = parseInt(target);
    } else {
      toast('Enter a valid @username, email, or user ID', 'error'); return;
    }
    if (userId === user.id) { toast("You can't message yourself", 'error'); return; }
    closeNewChat();
    await openOrCreateConv(userId);
  } catch (err) {
    toast(err.message || 'Failed to start chat', 'error');
  }
}

let previewTimer = null;
async function previewChatTarget(val) {
  const preview = document.getElementById('newChatPreview');
  if (!val || val.length < 2) { preview.textContent = ''; return; }
  clearTimeout(previewTimer);
  previewTimer = setTimeout(async () => {
    try {
      let found = null;
      if (val.startsWith('@') || (!val.includes('@') && isNaN(parseInt(val)))) {
        found = await apiFetch(`/users/search?username=${encodeURIComponent(val.replace('@',''))}`).catch(() => null);
      } else if (val.includes('@') && val.includes('.')) {
        found = await apiFetch(`/users/search?email=${encodeURIComponent(val)}`).catch(() => null);
      }
      if (found && found.id) {
        preview.innerHTML = `<span style="color:#16a34a;">✅ <strong>${found.full_name}</strong>${found.username ? ` (@${found.username})` : ''}</span>`;
      }
    } catch { preview.textContent = ''; }
  }, 400);
}

// Close modal on backdrop click
document.getElementById('newChatModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('newChatModal')) closeNewChat();
});

connectSocket();
loadConversations();
</script>
