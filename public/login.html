<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Ethio Gigs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+Ethiopic:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<nav class="navbar"><div class="nav-container"><a href="/" class="logo">Ethio<span>Gigs</span></a><div class="nav-actions"><button class="lang-toggle" id="langToggle">🇪🇹 አማርኛ</button></div></div></nav>
<div class="form-page">
  <div class="form-card">
    <h2>Welcome back</h2>
    <p>Sign in to your Ethio Gigs account</p>
    <div id="formError" class="form-error hidden"></div>
    <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="you@example.com" /></div>
    <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="••••••••" /></div>
    <button class="btn btn-primary btn-full" onclick="doLogin()">Sign In</button>
    <div class="form-divider">Don't have an account? <a href="/register.html" style="color:var(--teal);font-weight:600;">Register</a></div>
  </div>
</div>
<script src="js/app.js"></script>
<script src="js/i18n.js"></script>
<script>
async function doLogin() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('formError');
  errEl.classList.add('hidden');
  try {
    const data = await apiFetch('/auth/login', { method: 'POST', body: JSON.stringify({ email, password }) });
    setAuth(data.token, data.user);
    const user = data.user;
    if (user.role === 'admin') window.location.href = '/admin.html';
    else if (user.active_role === 'freelancer') window.location.href = '/dashboard.html';
    else window.location.href = '/dashboard.html';
  } catch (err) {
    errEl.textContent = err.message || 'Login failed. Check your credentials.';
    errEl.classList.remove('hidden');
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
