<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="pageTitle">Marketplace — Ethio Gigs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+Ethiopic:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .role-tab { padding:14px 24px;border:none;background:none;font-weight:600;font-size:0.95rem;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;transition:all .2s; }
    .role-tab.active { color:var(--blue);border-bottom-color:var(--blue); }
    .role-tab:hover { color:var(--blue); }
    .job-card { background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px;transition:all .2s;cursor:pointer; }
    .job-card:hover { box-shadow:var(--shadow-lg);transform:translateY(-2px);border-color:var(--teal); }
    .job-card-title { font-size:1.05rem;font-weight:700;margin-bottom:6px; }
    .job-card-meta { display:flex;flex-wrap:wrap;gap:10px;font-size:0.82rem;color:var(--muted);margin-bottom:10px; }
    .job-card-desc { color:var(--muted);font-size:0.88rem;line-height:1.6;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden; }
    .job-card-footer { display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px; }
  </style>
</head>
<body>
<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="/" class="logo">Ethio<span>Gigs</span></a>
    <div class="nav-links" id="navLinks">
      <a href="/">Home</a>
      <a href="/marketplace.html" id="navMarketLabel">Marketplace</a>
      <a href="/post-job.html" class="auth-only client-only hidden">Post a Job</a>
      <a href="/dashboard.html" class="auth-only hidden">Dashboard</a>
    </div>
    <div class="nav-actions">
      <button class="lang-toggle" id="langToggle">🇪🇹 አማርኛ</button>
      <a href="/login.html" class="btn btn-outline guest-only">Login</a>
      <a href="/register.html" class="btn btn-primary guest-only">Register</a>
      <button class="btn btn-outline auth-only hidden" id="logoutBtn">Logout</button>
    </div>
  </div>
</nav>

<!-- Role tabs — only shown when logged in -->
<div id="roleTabs" class="hidden" style="background:var(--card);border-bottom:1px solid var(--border);">
  <div style="max-width:1200px;margin:0 auto;padding:0 20px;display:flex;">
    <button id="tabFreelancers" class="role-tab client-only hidden" onclick="switchView('freelancers')">👥 Find Freelancers</button>
    <button id="tabJobs" class="role-tab freelancer-only hidden" onclick="switchView('jobs')">💼 Browse Jobs</button>
  </div>
</div>

<div class="marketplace-layout">
  <aside class="filters-panel">
    <h3 id="filterTitle">Filters</h3>
    <div class="filter-group"><label>Keyword</label><input type="text" id="filterKeyword" placeholder="Search..." /></div>

    <!-- Freelancer filters (clients) -->
    <div id="freelancerFilterFields">
      <div class="filter-group"><label>Min Rating</label>
        <select id="filterRating"><option value="">Any</option><option value="4">4+ stars</option><option value="4.5">4.5+ stars</option></select>
      </div>
      <div class="filter-group"><label>Price Range (ETB/hr)</label>
        <div class="price-range"><input type="number" id="filterMinRate" placeholder="Min" /><span>—</span><input type="number" id="filterMaxRate" placeholder="Max" /></div>
      </div>
      <div class="filter-group"><label>Verified Only</label>
        <select id="filterVerified"><option value="">All</option><option value="true">Verified Only</option></select>
      </div>
    </div>

    <!-- Job filters (freelancers) -->
    <div id="jobFilterFields" class="hidden">
      <div class="filter-group"><label>Project Type</label>
        <select id="filterProjectType"><option value="">Any</option><option value="fixed">Fixed Price</option><option value="hourly">Hourly</option></select>
      </div>
      <div class="filter-group"><label>Budget Range (ETB)</label>
        <div class="price-range"><input type="number" id="filterBudgetMin" placeholder="Min" /><span>—</span><input type="number" id="filterBudgetMax" placeholder="Max" /></div>
      </div>
    </div>

    <button class="btn btn-primary btn-full" onclick="applyFilters()">Apply Filters</button>
  </aside>

  <main>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
      <h2 class="section-title" style="text-align:left;margin:0;" id="mainTitle">Browse Freelancers</h2>
      <span id="resultCount" style="color:var(--muted);font-size:0.88rem;"></span>
    </div>
    <div id="resultsList"><div class="loading-spinner">Loading...</div></div>
  </main>
</div>

<script src="js/app.js"></script>
<script src="js/i18n.js"></script>
<script src="js/notifications.js?v=1"></script>
<script>
const currentUser = getUser();
let currentView = 'freelancers';

function isFreelancer() {
  return currentUser && (currentUser.active_role === 'freelancer' || (currentUser.role === 'freelancer' && !currentUser.active_role));
}
function isClient() {
  return !currentUser || currentUser.active_role === 'client' || currentUser.role === 'client' || currentUser.role === 'admin';
}

function initView() {
  if (isLoggedIn()) {
    document.getElementById('roleTabs').classList.remove('hidden');
    if (isFreelancer()) {
      // Freelancers ONLY see jobs — hide freelancer tab, show jobs tab
      document.getElementById('tabJobs')?.classList.remove('hidden');
      document.getElementById('tabFreelancers')?.classList.add('hidden');
      switchView('jobs');
    } else {
      // Clients ONLY see freelancers — hide jobs tab, show freelancers tab
      document.getElementById('tabFreelancers')?.classList.remove('hidden');
      document.getElementById('tabJobs')?.classList.add('hidden');
      switchView('freelancers');
    }
  } else {
    // Guests see freelancers
    switchView('freelancers');
  }
}

function switchView(view) {
  currentView = view;
  const isJobs = view === 'jobs';

  document.getElementById('tabFreelancers')?.classList.toggle('active', !isJobs);
  document.getElementById('tabJobs')?.classList.toggle('active', isJobs);
  document.getElementById('mainTitle').textContent = isJobs ? 'Browse Jobs' : 'Browse Freelancers';
  document.getElementById('pageTitle').textContent = isJobs ? 'Find Jobs — Ethio Gigs' : 'Marketplace — Ethio Gigs';
  document.getElementById('filterTitle').textContent = isJobs ? 'Job Filters' : 'Filters';
  document.getElementById('freelancerFilterFields').classList.toggle('hidden', isJobs);
  document.getElementById('jobFilterFields').classList.toggle('hidden', !isJobs);

  if (isJobs) loadJobs();
  else loadFreelancers();
}

async function loadFreelancers() {
  const keyword = document.getElementById('filterKeyword')?.value || '';
  const min_rating = document.getElementById('filterRating')?.value || '';
  const min_rate = document.getElementById('filterMinRate')?.value || '';
  const max_rate = document.getElementById('filterMaxRate')?.value || '';
  const verified = document.getElementById('filterVerified')?.value || '';
  const query = new URLSearchParams({ keyword, min_rating, min_rate, max_rate, verified }).toString();
  const container = document.getElementById('resultsList');
  container.innerHTML = '<div class="loading-spinner">Loading...</div>';
  try {
    const freelancers = await apiFetch(`/marketplace?${query}`);
    document.getElementById('resultCount').textContent = `${freelancers.length} freelancer${freelancers.length !== 1 ? 's' : ''} found`;
    container.innerHTML = freelancers.length
      ? `<div class="freelancers-grid">${freelancers.map(renderFreelancerCard).join('')}</div>`
      : '<p class="text-center" style="color:var(--muted);padding:40px;">No freelancers found.</p>';
  } catch {
    container.innerHTML = '<p class="text-center" style="color:var(--muted);">Error loading freelancers.</p>';
  }
}

async function loadJobs() {
  const keyword = document.getElementById('filterKeyword')?.value || '';
  const project_type = document.getElementById('filterProjectType')?.value || '';
  const budget_min = document.getElementById('filterBudgetMin')?.value || '';
  const budget_max = document.getElementById('filterBudgetMax')?.value || '';
  const container = document.getElementById('resultsList');
  container.innerHTML = '<div class="loading-spinner">Loading...</div>';
  try {
    const query = new URLSearchParams({ status: 'open', keyword, project_type, budget_min, budget_max }).toString();
    const jobs = await apiFetch(`/jobs?${query}`);
    document.getElementById('resultCount').textContent = `${jobs.length} job${jobs.length !== 1 ? 's' : ''} found`;
    container.innerHTML = jobs.length
      ? `<div class="freelancers-grid">${jobs.map(renderJobCard).join('')}</div>`
      : '<p class="text-center" style="color:var(--muted);padding:40px;">No open jobs found. Check back soon!</p>';
  } catch {
    container.innerHTML = '<p class="text-center" style="color:var(--muted);">Error loading jobs.</p>';
  }
}

function renderFreelancerCard(f) {
  const avatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(f.full_name)}&background=1E3A8A&color=fff&size=80`;
  const level = f.reputation_level || 'bronze';
  const topSkills = (f.top_skills || '').split(',').filter(Boolean).slice(0, 3);
  return `
    <div class="freelancer-card" onclick="window.location='/profile.html?id=${f.id}'">
      <div class="fc-header">
        <img class="fc-avatar" src="${avatar}" alt="${f.full_name}" />
        <div>
          <div class="fc-name">${f.full_name}</div>
          <div class="fc-title">${f.title || 'Freelancer'}</div>
        </div>
      </div>
      <div class="fc-badges">
        ${f.is_verified ? '<span class="badge badge-verified">✓ Verified</span>' : ''}
        <span class="badge badge-${level}">${level.charAt(0).toUpperCase() + level.slice(1)}</span>
        ${f.response_time_label ? `<span style="font-size:0.75rem;color:var(--teal);font-weight:600;">⚡ ${f.response_time_label}</span>` : ''}
      </div>
      ${topSkills.length ? `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;">${topSkills.map(s => `<span class="skill-tag" style="font-size:0.75rem;">${s.trim()}</span>`).join('')}</div>` : ''}
      <div class="fc-rating">⭐ ${parseFloat(f.avg_rating || 0).toFixed(1)} · ${f.completion_rate || 0}% completion</div>
      <div class="fc-footer">
        <span class="fc-rate">${f.hourly_rate ? f.hourly_rate + ' ETB/hr' : 'Negotiable'}</span>
        <button class="btn btn-sm btn-teal">View Profile</button>
      </div>
    </div>`;
}

function renderJobCard(j) {
  const timeAgo = getTimeAgo(j.created_at);
  const isPromoted = j.is_active_promoted || (j.is_promoted && j.promoted_until && new Date(j.promoted_until) > new Date());
  return `
    <div class="job-card" onclick="window.location='/job.html?id=${j.id}'" style="${isPromoted ? 'border-color:var(--gold);box-shadow:0 0 0 2px rgba(245,158,11,.15);' : ''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px;">
        <div class="job-card-title">${j.title}</div>
        <div style="display:flex;gap:6px;flex-shrink:0;">
          ${isPromoted ? `<span style="background:#fef9c3;color:#854d0e;padding:3px 8px;border-radius:20px;font-size:0.72rem;font-weight:700;white-space:nowrap;">⭐ Sponsored</span>` : ''}
          ${j.looking_for_team ? `<span style="background:#ede9fe;color:#6d28d9;padding:3px 8px;border-radius:20px;font-size:0.75rem;font-weight:700;white-space:nowrap;">👥 Team (${j.team_size || 2})</span>` : ''}
        </div>
      </div>
      <div class="job-card-meta">
        <span>💰 ${j.budget_min || 0}–${j.budget_max || 0} ETB</span>
        <span>📋 ${j.project_type || 'fixed'}</span>
        <span>👤 ${j.client_name || 'Client'}</span>
        <span>🕐 ${timeAgo}</span>
      </div>
      <div class="job-card-desc">${j.description || 'No description provided.'}</div>
      <div class="job-card-footer">
        <span class="status status-open">Open</span>
        <button class="btn btn-sm btn-primary" onclick="event.stopPropagation();window.location='/job.html?id=${j.id}'">${j.looking_for_team ? '👥 Apply as Team' : 'Apply Now'}</button>
      </div>
    </div>`;
}

function getTimeAgo(dateStr) {
  if (!dateStr) return '';
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs / 24)}d ago`;
}

function applyFilters() {
  if (currentView === 'jobs') loadJobs();
  else loadFreelancers();
}

// Handle URL params
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('keyword')) document.getElementById('filterKeyword').value = urlParams.get('keyword');

initView();
</script>
</body>
</html>
