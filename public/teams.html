<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teams — Ethio Gigs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+Ethiopic:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .teams-layout { max-width: 900px; margin: 32px auto; padding: 0 20px; }
    .team-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
    .team-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
    .team-name { font-size: 1.2rem; font-weight: 700; }
    .team-desc { color: var(--muted); font-size: 0.9rem; margin-bottom: 16px; }
    .members-list { display: flex; flex-wrap: wrap; gap: 10px; }
    .member-chip { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 0.88rem; }
    .member-role { font-size: 0.75rem; color: var(--teal); font-weight: 700; }
  </style>
</head>
<body>
<nav class="navbar"><div class="nav-container"><a href="/" class="logo">Ethio<span>Gigs</span></a>
  <div class="nav-links"><a href="/">Home</a><a href="/marketplace.html">Marketplace</a><a href="/dashboard.html" class="auth-only hidden">Dashboard</a></div>
  <div class="nav-actions"><button class="lang-toggle" id="langToggle">🇪🇹 አማርኛ</button><a href="/login.html" class="btn btn-outline guest-only">Login</a><button class="btn btn-outline auth-only hidden" id="logoutBtn">Logout</button></div>
</div></nav>

<div class="teams-layout">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
    <h2 style="font-size:1.5rem;font-weight:800;">👥 My Teams</h2>
    <button class="btn btn-primary" onclick="document.getElementById('createTeamForm').classList.toggle('hidden')">+ Create Team</button>
  </div>

  <!-- Create Team Form -->
  <div class="table-card hidden" id="createTeamForm" style="padding:24px;margin-bottom:24px;">
    <h3 style="font-weight:700;margin-bottom:16px;">Create a New Team</h3>
    <div class="form-group"><label>Team Name</label><input type="text" id="teamName" placeholder="e.g. Creative Studio Addis" /></div>
    <div class="form-group"><label>Description</label><textarea id="teamDesc" rows="2" placeholder="What does your team do?"></textarea></div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-primary" onclick="createTeam()">Create Team</button>
      <button class="btn btn-outline" onclick="document.getElementById('createTeamForm').classList.add('hidden')">Cancel</button>
    </div>
  </div>

  <div id="teamsList"><div class="loading-spinner">Loading teams...</div></div>
</div>

<script src="js/app.js"></script>
<script src="js/i18n.js"></script>
<script src="js/notifications.js?v=1"></script>
<script>
if (!isLoggedIn()) window.location.href = '/login.html';
const user = getUser();

async function loadTeams() {
  const container = document.getElementById('teamsList');
  try {
    const teams = await apiFetch('/teams/my');
    if (!teams.length) {
      container.innerHTML = `<div class="table-card" style="padding:40px;text-align:center;color:var(--muted);">
        <div style="font-size:2.5rem;margin-bottom:12px;">👥</div>
        <p>You're not in any teams yet. Create one to collaborate with other freelancers!</p>
      </div>`;
      return;
    }
    container.innerHTML = teams.map(t => `
      <div class="team-card">
        <div class="team-header">
          <div>
            <div class="team-name">${t.name}</div>
            <div style="font-size:0.8rem;color:var(--muted);margin-top:2px;">
              <span class="badge badge-${t.role === 'owner' ? 'gold' : 'silver'}">${t.role}</span>
              · Created ${new Date(t.created_at).toLocaleDateString()}
            </div>
          </div>
          ${t.role === 'owner' ? `<button class="btn btn-sm btn-outline" onclick="showInvite(${t.id})">+ Invite Member</button>` : ''}
        </div>
        ${t.description ? `<div class="team-desc">${t.description}</div>` : ''}
        <div id="members-${t.id}"><div style="color:var(--muted);font-size:0.85rem;">Loading members...</div></div>
        <div id="invite-${t.id}" class="hidden" style="margin-top:12px;display:flex;gap:8px;">
          <input type="email" id="inviteEmail-${t.id}" placeholder="member@email.com" style="flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:0.9rem;outline:none;" />
          <button class="btn btn-primary btn-sm" onclick="inviteMember(${t.id})">Invite</button>
        </div>
      </div>`).join('');

    for (const t of teams) loadTeamMembers(t.id, t.role === 'owner');
  } catch (err) {
    container.innerHTML = '<p style="color:var(--muted);text-align:center;">Could not load teams.</p>';
  }
}

async function loadTeamMembers(teamId, isOwner) {
  try {
    const team = await apiFetch(`/teams/${teamId}`);
    const container = document.getElementById(`members-${teamId}`);
    if (!container) return;
    container.innerHTML = `
      <div style="font-size:0.8rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">Members (${team.members.length})</div>
      <div class="members-list">
        ${team.members.map(m => `
          <div class="member-chip">
            <span>👤</span>
            <div>
              <div style="font-weight:600;">${m.full_name}</div>
              <div class="member-role">${m.role}</div>
            </div>
            ${isOwner && m.id !== user.id ? `<button onclick="removeMember(${teamId},${m.id})" style="background:none;border:none;cursor:pointer;color:#ef4444;font-size:1rem;margin-left:4px;">✕</button>` : ''}
          </div>`).join('')}
      </div>`;
  } catch {}
}

function showInvite(teamId) {
  document.getElementById(`invite-${teamId}`).classList.toggle('hidden');
}

async function inviteMember(teamId) {
  const email = document.getElementById(`inviteEmail-${teamId}`).value;
  if (!email) { toast('Enter an email', 'error'); return; }
  try {
    await apiFetch(`/teams/${teamId}/members`, { method: 'POST', body: JSON.stringify({ email }) });
    toast('Member invited!', 'success');
    document.getElementById(`inviteEmail-${teamId}`).value = '';
    loadTeamMembers(teamId, true);
  } catch (err) { toast(err.error === 'USER_NOT_FOUND' ? 'User not found' : 'Failed to invite', 'error'); }
}

async function removeMember(teamId, userId) {
  if (!confirm('Remove this member?')) return;
  try {
    await apiFetch(`/teams/${teamId}/members/${userId}`, { method: 'DELETE' });
    toast('Member removed', 'success');
    loadTeamMembers(teamId, true);
  } catch (err) { toast('Failed to remove', 'error'); }
}

async function createTeam() {
  const name = document.getElementById('teamName').value;
  const description = document.getElementById('teamDesc').value;
  if (!name) { toast('Team name is required', 'error'); return; }
  try {
    await apiFetch('/teams', { method: 'POST', body: JSON.stringify({ name, description }) });
    toast('Team created!', 'success');
    document.getElementById('createTeamForm').classList.add('hidden');
    document.getElementById('teamName').value = '';
    document.getElementById('teamDesc').value = '';
    loadTeams();
  } catch (err) { toast(err.message || 'Failed to create team', 'error'); }
}

loadTeams();
</script>
</body>
</html>
