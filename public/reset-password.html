<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Ethio Gigs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+Ethiopic:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<nav class="navbar"><div class="nav-container"><a href="/" class="logo">Ethio<span>Gigs</span></a></div></nav>
<div class="form-page">
  <div class="form-card" id="resetCard">
    <div style="text-align:center;margin-bottom:16px;"><div style="font-size:2.5rem;">🔑</div></div>
    <h2>Set new password</h2>
    <p>Enter your new password below.</p>
    <div id="formError" class="form-error hidden" style="background:#fee2e2;padding:10px 14px;border-radius:8px;margin-bottom:12px;"></div>
    <div id="formSuccess" class="hidden" style="background:#dcfce7;color:#15803d;padding:10px 14px;border-radius:8px;margin-bottom:12px;font-weight:600;"></div>
    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="newPassword" placeholder="Min 8 characters" />
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Repeat your password" />
    </div>
    <button class="btn btn-primary btn-full" id="resetBtn" onclick="doReset()">Reset Password</button>
    <div class="form-divider"><a href="/login.html" style="color:var(--teal);">← Back to Login</a></div>
  </div>
</div>
<script src="js/app.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const token = params.get('token');
const email = params.get('email');

if (!token || !email) {
  document.getElementById('resetCard').innerHTML = `
    <div style="text-align:center;padding:20px;">
      <div style="font-size:3rem;margin-bottom:12px;">❌</div>
      <h3>Invalid reset link</h3>
      <p style="color:var(--muted);">This link is invalid or has expired.</p>
      <a href="/login.html" class="btn btn-primary" style="margin-top:16px;">Back to Login</a>
    </div>`;
}

async function doReset() {
  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  const errEl = document.getElementById('formError');
  const successEl = document.getElementById('formSuccess');
  errEl.classList.add('hidden');

  if (!newPassword || newPassword.length < 8) { errEl.textContent = 'Password must be at least 8 characters.'; errEl.classList.remove('hidden'); return; }
  if (newPassword !== confirmPassword) { errEl.textContent = 'Passwords do not match.'; errEl.classList.remove('hidden'); return; }

  const btn = document.getElementById('resetBtn');
  btn.textContent = 'Resetting...';
  btn.disabled = true;

  try {
    await apiFetch('/auth/reset-password', { method: 'POST', body: JSON.stringify({ email, token, new_password: newPassword }) });
    successEl.textContent = '✅ Password reset successfully! Redirecting to login...';
    successEl.classList.remove('hidden');
    setTimeout(() => window.location.href = '/login.html', 2000);
  } catch (err) {
    errEl.textContent = err.message || 'Reset failed. The link may have expired.';
    errEl.classList.remove('hidden');
    btn.textContent = 'Reset Password';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
