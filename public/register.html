<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Ethio Gigs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+Ethiopic:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .otp-inputs { display:flex; gap:10px; justify-content:center; margin:20px 0; }
    .otp-input { width:52px; height:56px; text-align:center; font-size:1.5rem; font-weight:800; border:2px solid var(--border); border-radius:10px; outline:none; }
    .otp-input:focus { border-color:var(--teal); }
  </style>
</head>
<body>
<nav class="navbar"><div class="nav-container"><a href="/" class="logo">Ethio<span>Gigs</span></a><div class="nav-actions"><button class="lang-toggle" id="langToggle">🇪🇹 አማርኛ</button></div></div></nav>

<div class="form-page">
  <!-- Step 1: Registration form -->
  <div class="form-card" id="registerStep">
    <h2>Create your account</h2>
    <p>Join Ethiopia's fastest-growing freelance marketplace</p>
    <div id="formError" class="form-error hidden" style="background:#fee2e2;padding:10px 14px;border-radius:8px;margin-bottom:12px;"></div>
    <div class="form-group">
      <label>Full Name <span style="color:#dc2626;">*</span></label>
      <input type="text" id="name" placeholder="Abebe Kebede" />
    </div>
    <div class="form-group">
      <label>Email Address <span style="color:#dc2626;">*</span></label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label>Phone Number <span style="color:#dc2626;">*</span></label>
      <input type="tel" id="phone" placeholder="+251 9XX XXX XXX" />
      <div style="font-size:.78rem;color:var(--muted);margin-top:4px;">Required for account security and verification</div>
    </div>
    <div class="form-group">
      <label>Password <span style="color:#dc2626;">*</span></label>
      <input type="password" id="password" placeholder="Min 8 characters" />
    </div>
    <div class="form-group">
      <label>I want to</label>
      <select id="role">
        <option value="client">Hire Freelancers (Client)</option>
        <option value="freelancer">Work as a Freelancer</option>
      </select>
    </div>
    <button class="btn btn-primary btn-full" id="registerBtn" onclick="doRegister()">Create Account →</button>
    <div class="form-divider">Already have an account? <a href="/login.html" style="color:var(--teal);font-weight:600;">Sign in</a></div>
  </div>

  <!-- Step 2: OTP verification -->
  <div class="form-card hidden" id="otpStep">
    <div style="text-align:center;margin-bottom:16px;">
      <div style="font-size:3rem;margin-bottom:8px;">📧</div>
      <h2 style="margin-bottom:4px;">Check your email</h2>
      <p style="color:var(--muted);">We sent a 6-digit code to <strong id="otpEmailDisplay"></strong></p>
    </div>
    <div id="otpError" class="form-error hidden" style="background:#fee2e2;padding:10px 14px;border-radius:8px;margin-bottom:12px;"></div>
    <div class="otp-inputs">
      <input class="otp-input" id="otp0" maxlength="1" oninput="otpNext(this,1)" onkeydown="otpBack(event,this,null)" />
      <input class="otp-input" id="otp1" maxlength="1" oninput="otpNext(this,2)" onkeydown="otpBack(event,this,0)" />
      <input class="otp-input" id="otp2" maxlength="1" oninput="otpNext(this,3)" onkeydown="otpBack(event,this,1)" />
      <input class="otp-input" id="otp3" maxlength="1" oninput="otpNext(this,4)" onkeydown="otpBack(event,this,2)" />
      <input class="otp-input" id="otp4" maxlength="1" oninput="otpNext(this,5)" onkeydown="otpBack(event,this,3)" />
      <input class="otp-input" id="otp5" maxlength="1" oninput="otpNext(this,null)" onkeydown="otpBack(event,this,4)" />
    </div>
    <button class="btn btn-primary btn-full" id="verifyBtn" onclick="doVerifyOTP()">Verify Account</button>
    <div style="text-align:center;margin-top:14px;">
      <span style="color:var(--muted);font-size:.88rem;">Didn't receive it? </span>
      <button onclick="resendOTP()" style="background:none;border:none;color:var(--teal);font-weight:600;cursor:pointer;font-size:.88rem;" id="resendBtn">Resend code</button>
      <span id="resendTimer" style="color:var(--muted);font-size:.82rem;"></span>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/i18n.js"></script>
<script>
let registeredEmail = '';
let resendCountdown = null;

async function doRegister() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const password = document.getElementById('password').value;
  const role = document.getElementById('role').value;
  const errEl = document.getElementById('formError');
  errEl.classList.add('hidden');

  if (!name) { showError(errEl, 'Full name is required.'); return; }
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError(errEl, 'Please enter a valid email address.'); return; }
  if (!phone) { showError(errEl, 'Phone number is required.'); return; }
  if (!password || password.length < 8) { showError(errEl, 'Password must be at least 8 characters.'); return; }

  const btn = document.getElementById('registerBtn');
  btn.textContent = 'Creating account...';
  btn.disabled = true;

  // Pick up referral code from URL ?ref=XXXXXXXX
  const refCode = new URLSearchParams(window.location.search).get('ref') || null;

  try {
    const data = await apiFetch('/auth/register', {
      method: 'POST',
      body: JSON.stringify({ name, email, phone, password, role, ref_code: refCode })
    });
    setAuth(data.token, data.user);
    registeredEmail = email;

    // Show OTP step
    document.getElementById('registerStep').classList.add('hidden');
    document.getElementById('otpStep').classList.remove('hidden');
    document.getElementById('otpEmailDisplay').textContent = email;
    document.getElementById('otp0').focus();
    startResendTimer();
  } catch (err) {
    const msg = err.error === 'EMAIL_ALREADY_REGISTERED'
      ? 'An account with this email or phone already exists.'
      : (err.message || err.fields?.general || 'Registration failed. Please try again.');
    showError(errEl, msg);
    btn.textContent = 'Create Account →';
    btn.disabled = false;
  }
}

async function doVerifyOTP() {
  const otp = [0,1,2,3,4,5].map(i => document.getElementById(`otp${i}`).value).join('');
  const errEl = document.getElementById('otpError');
  errEl.classList.add('hidden');

  if (otp.length !== 6) { showError(errEl, 'Please enter the full 6-digit code.'); return; }

  const btn = document.getElementById('verifyBtn');
  btn.textContent = 'Verifying...';
  btn.disabled = true;

  try {
    await apiFetch('/auth/verify-otp', { method: 'POST', body: JSON.stringify({ email: registeredEmail, otp }) });
    toast('✅ Account verified! Redirecting...', 'success');
    setTimeout(() => window.location.href = '/dashboard.html', 1200);
  } catch (err) {
    const msg = err.error === 'OTP_EXPIRED'
      ? 'Code expired. Please request a new one.'
      : (err.message || 'Invalid code. Please try again.');
    showError(errEl, msg);
    btn.textContent = 'Verify Account';
    btn.disabled = false;
  }
}

async function resendOTP() {
  try {
    await apiFetch('/auth/resend-otp', { method: 'POST', body: JSON.stringify({ email: registeredEmail }) });
    toast('New code sent to your email!', 'success');
    startResendTimer();
  } catch { toast('Failed to resend. Try again.', 'error'); }
}

function startResendTimer() {
  let secs = 60;
  const btn = document.getElementById('resendBtn');
  const timer = document.getElementById('resendTimer');
  btn.disabled = true;
  btn.style.opacity = '0.4';
  clearInterval(resendCountdown);
  resendCountdown = setInterval(() => {
    timer.textContent = ` (${secs}s)`;
    secs--;
    if (secs < 0) {
      clearInterval(resendCountdown);
      btn.disabled = false;
      btn.style.opacity = '1';
      timer.textContent = '';
    }
  }, 1000);
}

function otpNext(el, nextIdx) {
  if (el.value && nextIdx !== null) document.getElementById(`otp${nextIdx}`)?.focus();
  if (nextIdx === null) {
    const otp = [0,1,2,3,4,5].map(i => document.getElementById(`otp${i}`).value).join('');
    if (otp.length === 6) doVerifyOTP();
  }
}

function otpBack(e, el, prevIdx) {
  if (e.key === 'Backspace' && !el.value && prevIdx !== null) {
    document.getElementById(`otp${prevIdx}`)?.focus();
  }
}

function showError(el, msg) {
  el.textContent = msg;
  el.classList.remove('hidden');
}
</script>
</body>
</html>
