<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Ethio Gigs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+Ethiopic:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<nav class="navbar"><div class="nav-container"><a href="/" class="logo">Ethio<span>Gigs</span></a><div class="nav-actions"><button class="lang-toggle" id="langToggle">🇪🇹 አማርኛ</button></div></div></nav>
<div class="form-page">
  <div class="form-card">
    <h2>Create your account</h2>
    <p>Join Ethiopia's fastest-growing freelance marketplace</p>
    <div id="formError" class="form-error hidden"></div>
    <div class="form-group"><label>Full Name</label><input type="text" id="name" placeholder="Abebe Kebede" /></div>
    <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="you@example.com" /></div>
    <div class="form-group"><label>Phone (optional)</label><input type="tel" id="phone" placeholder="+251 9XX XXX XXX" /></div>
    <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="Min 8 characters" /></div>
    <div class="form-group">
      <label>I want to</label>
      <select id="role">
        <option value="client">Hire Freelancers (Client)</option>
        <option value="freelancer">Work as a Freelancer</option>
      </select>
    </div>
    <button class="btn btn-primary btn-full" onclick="doRegister()">Create Account</button>
    <div class="form-divider">Already have an account? <a href="/login.html" style="color:var(--teal);font-weight:600;">Sign in</a></div>
  </div>
</div>
<script src="js/app.js"></script>
<script src="js/i18n.js"></script>
<script>
async function doRegister() {
  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const phone = document.getElementById('phone').value;
  const password = document.getElementById('password').value;
  const role = document.getElementById('role').value;
  const errEl = document.getElementById('formError');
  errEl.classList.add('hidden');
  if (!name || !email || !password) { errEl.textContent = 'Please fill all required fields.'; errEl.classList.remove('hidden'); return; }
  try {
    const data = await apiFetch('/auth/register', { method: 'POST', body: JSON.stringify({ name, email, phone, password, role }) });
    setAuth(data.token, data.user);
    window.location.href = '/dashboard.html';
  } catch (err) {
    errEl.textContent = err.error === 'EMAIL_ALREADY_REGISTERED' ? 'This email is already registered.' : (err.message || 'Registration failed.');
    errEl.classList.remove('hidden');
  }
}
</script>
</body>
</html>
